# Configuração da CLI do Supabase
# Documentação: https://supabase.com/docs/reference/cli/config
#
# Para usar a CLI com este projeto:
#   supabase login
#   supabase link --project-ref SEU_PROJECT_REF
#   supabase db push
#
# O PROJECT_REF está em: Supabase → Settings → General → Reference ID

[project]
project_id = "portal-tucan"

[api]
# Porta local (apenas para desenvolvimento local com Docker)
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Porta local do PostgreSQL
port = 54322
shadow_port = 54320
major_version = 15

[studio]
# Porta do Supabase Studio local
port = 54323
api_url = "http://localhost"

[inbucket]
# Servidor de e-mail local (para testar Magic Link etc.)
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
# URL do site — atualizar para produção
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # true em produção

[[auth.email.template]]
subject = "Confirme seu e-mail — Portal Tucan"

[storage]
file_size_limit = "52428800"   # 50MB
